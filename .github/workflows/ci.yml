name: CI

on:
  push:
  pull_request:

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python compile check
        run: python -m compileall scripts
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Naming check on fixture machine
        run: python scripts/check_names.py --root tests/fixtures/minimal-machine
      - name: OKH validate on fixture machine
        run: python scripts/validate_okh.py --root tests/fixtures/minimal-machine
